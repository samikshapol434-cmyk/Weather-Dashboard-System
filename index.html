<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather Dashboard</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        header h1 {
            font-size: 32px;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            padding: 13px;
            width: 240px;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
        }

        .search-box button {
            padding: 13px 20px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .search-box button:hover {
            background: #0284c7;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .main-weather {
            min-height: 330px;
        }

        .location {
            font-size: 25px;
            font-weight: bold;
        }

        .date {
            color: #cbd5e1;
            margin-top: 8px;
        }

        .temperature {
            font-size: 75px;
            font-weight: bold;
            margin: 20px 0 5px;
        }

        .condition {
            font-size: 22px;
            color: #bae6fd;
        }

        .weather-icon {
            font-size: 75px;
            float: right;
        }

        .details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .detail-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
        }

        .detail-box h3 {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .detail-box p {
            font-size: 22px;
            font-weight: bold;
        }

        .forecast-section {
            margin-top: 20px;
        }

        .forecast-section h2 {
            margin-bottom: 15px;
        }

        .forecast {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
        }

        .forecast-card {
            text-align: center;
            padding: 18px 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }

        .forecast-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .forecast-card .icon {
            font-size: 30px;
            margin: 8px;
        }

        .forecast-card p {
            font-size: 14px;
            margin: 4px;
        }

        .loading {
            text-align: center;
            font-size: 20px;
            padding: 30px;
        }

        .error {
            color: #fecaca;
            text-align: center;
            margin: 15px;
        }

        @media (max-width: 900px) {

            .dashboard {
                grid-template-columns: 1fr;
            }

            .forecast {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 600px) {

            body {
                padding: 15px;
            }

            header {
                display: block;
            }

            header h1 {
                margin-bottom: 20px;
            }

            .search-box {
                width: 100%;
            }

            .search-box input {
                width: 100%;
            }

            .forecast {
                grid-template-columns: repeat(2, 1fr);
            }

            .temperature {
                font-size: 55px;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <header>

            <h1>🌤️ Weather Dashboard</h1>

            <div class="search-box">
                <input
                    type="text"
                    id="cityInput"
                    placeholder="Enter city name"
                    value="Nashik"
                >

                <button onclick="searchWeather()">
                    Search
                </button>
            </div>

        </header>

        <div id="loading" class="loading">
            Loading weather...
        </div>

        <div id="error" class="error"></div>

        <main id="weatherDashboard" style="display:none;">

            <div class="dashboard">

                <!-- Main Weather -->
                <div class="card main-weather">

                    <div class="weather-icon" id="weatherIcon">
                        ☀️
                    </div>

                    <div class="location" id="location">
                        Nashik
                    </div>

                    <div class="date" id="date">
                        Today
                    </div>

                    <div class="temperature">
                        <span id="temperature">--</span>°C
                    </div>

                    <div class="condition" id="condition">
                        Clear Sky
                    </div>

                    <p style="margin-top:15px;">
                        Feels like
                        <span id="feelsLike">--</span>°C
                    </p>

                </div>

                <!-- Details -->
                <div class="card">

                    <h2>Weather Details</h2>

                    <br>

                    <div class="details">

                        <div class="detail-box">
                            <h3>💧 Humidity</h3>
                            <p id="humidity">--%</p>
                        </div>

                        <div class="detail-box">
                            <h3>💨 Wind Speed</h3>
                            <p id="wind">-- km/h</p>
                        </div>

                        <div class="detail-box">
                            <h3>🌧️ Precipitation</h3>
                            <p id="rain">-- mm</p>
                        </div>

                        <div class="detail-box">
                            <h3>🌅 Sunrise</h3>
                            <p id="sunrise">--</p>
                        </div>

                        <div class="detail-box">
                            <h3>🌇 Sunset</h3>
                            <p id="sunset">--</p>
                        </div>

                    </div>

                </div>

            </div>

            <!-- Forecast -->
            <div class="card forecast-section">

                <h2>📅 7-Day Forecast</h2>

                <div class="forecast" id="forecast">

                </div>

            </div>

        </main>

    </div>


    <script>

        const weatherIcons = {

            "Clear Sky": "☀️",
            "Mainly Clear": "🌤️",
            "Partly Cloudy": "⛅",
            "Overcast": "☁️",
            "Foggy": "🌫️",
            "Light Drizzle": "🌦️",
            "Drizzle": "🌧️",
            "Heavy Drizzle": "🌧️",
            "Light Rain": "🌦️",
            "Rain": "🌧️",
            "Heavy Rain": "🌧️",
            "Rain Showers": "🌦️",
            "Heavy Rain Showers": "⛈️",
            "Thunderstorm": "⛈️",
            "Snow": "❄️",
            "Heavy Snow": "❄️"
        };


        function formatTime(time) {

            return new Date(time).toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });

        }


        function formatDate(date) {

            return new Date(date).toLocaleDateString([], {
                weekday: "short",
                month: "short",
                day: "numeric"
            });

        }


        async function searchWeather() {

            const city = document.getElementById("cityInput").value.trim();

            if (city === "") {

                alert("Please enter a city name");
                return;

            }

            document.getElementById("loading").style.display = "block";
            document.getElementById("weatherDashboard").style.display = "none";
            document.getElementById("error").innerText = "";

            try {

                const response = await fetch(
                    `/weather?city=${encodeURIComponent(city)}`
                );

                const data = await response.json();

                if (!response.ok) {

                    throw new Error(data.error);

                }

                document.getElementById("location").innerText =
                    `${data.city}, ${data.country}`;

                document.getElementById("date").innerText =
                    new Date().toDateString();

                document.getElementById("temperature").innerText =
                    Math.round(data.temperature);

                document.getElementById("feelsLike").innerText =
                    Math.round(data.feels_like);

                document.getElementById("condition").innerText =
                    data.weather;

                document.getElementById("weatherIcon").innerText =
                    weatherIcons[data.weather] || "🌤️";

                document.getElementById("humidity").innerText =
                    `${data.humidity}%`;

                document.getElementById("wind").innerText =
                    `${data.wind_speed} km/h`;

                document.getElementById("rain").innerText =
                    `${data.precipitation} mm`;

                document.getElementById("sunrise").innerText =
                    formatTime(data.sunrise);

                document.getElementById("sunset").innerText =
                    formatTime(data.sunset);


                const forecastContainer =
                    document.getElementById("forecast");

                forecastContainer.innerHTML = "";


                data.forecast.forEach(day => {

                    const card = document.createElement("div");

                    card.className = "forecast-card";

                    card.innerHTML = `

                        <h3>${formatDate(day.date)}</h3>

                        <div class="icon">
                            ${weatherIcons[day.weather] || "🌤️"}
                        </div>

                        <p>${day.weather}</p>

                        <p>
                            <b>${Math.round(day.max_temp)}°</b>
                            /
                            ${Math.round(day.min_temp)}°
                        </p>

                    `;

                    forecastContainer.appendChild(card);

                });


                document.getElementById("loading").style.display = "none";

                document.getElementById("weatherDashboard").style.display =
                    "block";

            }

            catch (error) {

                document.getElementById("loading").style.display = "none";

                document.getElementById("error").innerText =
                    "❌ " + error.message;

            }

        }


        document.getElementById("cityInput").addEventListener(
            "keypress",
            function(event) {

                if (event.key === "Enter") {

                    searchWeather();

                }

            }
        );


        searchWeather();

    </script>

</body>

</html>
